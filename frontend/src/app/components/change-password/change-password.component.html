<div
  class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 px-4 sm:px-6 lg:px-8">
  <div class="w-full max-w-[400px]">

    <div class="text-center mb-10">
      <h2 class="text-xl font-black text-slate-900 tracking-tight uppercase">Thay đổi mật khẩu</h2>
      <p class="mt-1 text-[11px] text-slate-500 font-bold uppercase tracking-[0.2em]">Thay đổi mật khẩu để bảo vệ tài
        khoản</p>
    </div>

    <div class="bg-white rounded-xl shadow-xl p-8 space-y-6">
      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Mật khẩu hiện tại</label>
          <app-password-input placeholder="Nhập mật khẩu hiện tại" [control]="currentPasswordControl">
          </app-password-input>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Mật khẩu mới</label>
          <app-password-input placeholder="Nhập mật khẩu mới" [control]="newPasswordControl">
          </app-password-input>
          <div class="mt-3">
            <app-password-checklist [password]="newPasswordControl.value"></app-password-checklist>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Xác nhận mật khẩu mới</label>
          <app-password-input placeholder="Nhập lại mật khẩu mới" [control]="confirmPasswordControl">
          </app-password-input>
        </div>

        <button type="submit" [disabled]="loading || form.invalid"
          class="w-full h-[46px] flex justify-center items-center border border-transparent rounded-md text-[12px] font-bold text-white bg-blue-600 hover:bg-blue-700 transition-colors uppercase tracking-widest disabled:opacity-50 disabled:cursor-not-allowed">
          <span *ngIf="!loading">Cập nhật mật khẩu</span>
          <i *ngIf="loading" class="fas fa-circle-notch animate-spin text-lg"></i>
        </button>
      </form>
    </div>
  </div>
</div>
